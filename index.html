<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en construcción</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .box {
            background: white;
            padding: 40px 50px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
        }

        .lottie {
            width: 260px;
            height: 260px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Este dominio está tomado</h1>
        <p>El sitio se encuentra actualmente en construcción.</p>

        <!-- Contenedor de la animación -->
        <div class="lottie" id="anim"></div>
    </div>

    <!-- Script de Lottie -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.10.2/lottie.min.js"></script>

    <script>
    lottie.loadAnimation({
        container: document.getElementById('anim'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: 'https://lottie.host/3f3c4d9b-9c3a-4f7d-9c5d-0b8f1a2e5c9a/4xJz0m8p8y.json'
    });
    </script>




</body>
</html>
